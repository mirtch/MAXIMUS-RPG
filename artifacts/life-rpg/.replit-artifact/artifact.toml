kind = "web"
previewPath = "/"
title = "Life RPG"
version = "1.0.0"
id = "artifacts/life-rpg"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18218

[services.development]
run = "pnpm --filter @workspace/life-rpg run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/life-rpg", "run", "build" ]
publicDir = "artifacts/life-rpg/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18218"
BASE_PATH = "/"
